<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>地圖路徑編輯器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', sans-serif; padding: 20px; }
h1 { font-size: 18px; margin-bottom: 10px; }
.info { font-size: 13px; color: #aaa; margin-bottom: 15px; line-height: 1.6; }
.toolbar { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; flex-wrap: wrap; }
.toolbar button {
  padding: 8px 16px; border: 1px solid #555; border-radius: 4px;
  background: #0f3460; color: #eee; cursor: pointer; font-size: 13px;
}
.toolbar button:hover { background: #e94560; }
.toolbar button.active { background: #e94560; border-color: #e94560; }
.toolbar select, .toolbar input {
  padding: 6px 10px; border: 1px solid #555; border-radius: 4px;
  background: #16213e; color: #eee; font-size: 13px;
}
#canvas-container { display: inline-block; border: 2px solid #333; }
canvas { display: block; cursor: crosshair; }
#output {
  margin-top: 15px; padding: 12px; background: #0f3460; border-radius: 8px;
  font-family: monospace; font-size: 12px; white-space: pre-wrap;
  max-height: 300px; overflow-y: auto; display: none;
}
#preview-canvas { margin-top: 15px; border: 2px solid #333; display: none; }
.legend { display: flex; gap: 15px; margin-bottom: 10px; font-size: 12px; }
.legend span { display: flex; align-items: center; gap: 4px; }
.legend .swatch { width: 16px; height: 16px; border-radius: 3px; border: 1px solid #555; }
</style>
</head>
<body>

<h1>🗺️ 塔防地圖路徑編輯器</h1>
<div class="info">
  左鍵拖曳畫路徑（黑色），右鍵拖曳擦除。<br>
  畫完後點「設定入口/出口」標記起終點，再點「產生路徑程式碼」匯出。<br>
  格子大小：<b>20 × 10</b>（與遊戲相同）
</div>

<div class="legend">
  <span><div class="swatch" style="background:#2d5a27"></div> 可建塔（空地）</span>
  <span><div class="swatch" style="background:#1a1a1a"></div> 路徑</span>
  <span><div class="swatch" style="background:#e94560"></div> 入口</span>
  <span><div class="swatch" style="background:#4ecdc4"></div> 出口（基地）</span>
</div>

<div class="toolbar">
  <button id="btn-draw" class="active">🖌️ 畫路徑</button>
  <button id="btn-erase">🧹 擦除</button>
  <button id="btn-entry">🔴 設入口</button>
  <button id="btn-exit">🟢 設出口</button>
  <button id="btn-clear">🗑️ 全部清除</button>
  <span style="color:#666">|</span>
  <button id="btn-generate">📋 產生路徑程式碼</button>
  <button id="btn-preview">👁️ 預覽路徑</button>
</div>

<div id="canvas-container">
  <canvas id="editor"></canvas>
</div>

<canvas id="preview-canvas"></canvas>
<div id="output"></div>

<script>
const COLS = 20, ROWS = 10;
const CELL = 40; // pixel per cell
const canvas = document.getElementById('editor');
const ctx = canvas.getContext('2d');
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

// Grid: 0 = empty (buildable), 1 = path
const grid = Array.from({length: ROWS}, () => Array(COLS).fill(0));
let entry = null; // {x, y}
let exit = null;  // {x, y}

let tool = 'draw'; // draw, erase, entry, exit
let isDrawing = false;

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = c * CELL, y = r * CELL;
      if (grid[r][c] === 1) {
        ctx.fillStyle = '#1a1a1a';
      } else {
        ctx.fillStyle = '#2d5a27';
      }
      ctx.fillRect(x, y, CELL, CELL);
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(x, y, CELL, CELL);
    }
  }

  // Entry marker
  if (entry) {
    ctx.fillStyle = 'rgba(233, 69, 96, 0.7)';
    ctx.fillRect(entry.x * CELL, entry.y * CELL, CELL, CELL);
    ctx.fillStyle = '#fff';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('入', entry.x * CELL + CELL/2, entry.y * CELL + CELL/2);
  }

  // Exit marker
  if (exit) {
    ctx.fillStyle = 'rgba(78, 205, 196, 0.7)';
    ctx.fillRect(exit.x * CELL, exit.y * CELL, CELL, CELL);
    ctx.fillStyle = '#fff';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('出', exit.x * CELL + CELL/2, exit.y * CELL + CELL/2);
  }

  // Grid coordinates (small text)
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      ctx.fillText(`${c},${r}`, c * CELL + 2, r * CELL + 2);
    }
  }
}

function getCellFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) / CELL);
  const y = Math.floor((e.clientY - rect.top) / CELL);
  if (x >= 0 && x < COLS && y >= 0 && y < ROWS) return {x, y};
  return null;
}

function applyTool(cell) {
  if (!cell) return;
  if (tool === 'draw') {
    grid[cell.y][cell.x] = 1;
  } else if (tool === 'erase') {
    grid[cell.y][cell.x] = 0;
    if (entry && entry.x === cell.x && entry.y === cell.y) entry = null;
    if (exit && exit.x === cell.x && exit.y === cell.y) exit = null;
  } else if (tool === 'entry') {
    entry = {x: cell.x, y: cell.y};
    grid[cell.y][cell.x] = 1;
    tool = 'draw';
    updateToolButtons();
  } else if (tool === 'exit') {
    exit = {x: cell.x, y: cell.y};
    grid[cell.y][cell.x] = 1;
    tool = 'draw';
    updateToolButtons();
  }
  draw();
}

canvas.addEventListener('mousedown', e => {
  e.preventDefault();
  if (e.button === 2) { // right click = erase
    tool = 'erase';
    updateToolButtons();
  }
  isDrawing = true;
  applyTool(getCellFromEvent(e));
});

canvas.addEventListener('mousemove', e => {
  if (!isDrawing) return;
  applyTool(getCellFromEvent(e));
});

canvas.addEventListener('mouseup', e => {
  isDrawing = false;
  if (e.button === 2) {
    tool = 'draw';
    updateToolButtons();
  }
});

canvas.addEventListener('contextmenu', e => e.preventDefault());

// Toolbar
function updateToolButtons() {
  document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
  const id = {draw:'btn-draw', erase:'btn-erase', entry:'btn-entry', exit:'btn-exit'}[tool];
  if (id) document.getElementById(id).classList.add('active');
}

document.getElementById('btn-draw').onclick = () => { tool = 'draw'; updateToolButtons(); };
document.getElementById('btn-erase').onclick = () => { tool = 'erase'; updateToolButtons(); };
document.getElementById('btn-entry').onclick = () => { tool = 'entry'; updateToolButtons(); };
document.getElementById('btn-exit').onclick = () => { tool = 'exit'; updateToolButtons(); };
document.getElementById('btn-clear').onclick = () => {
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) grid[r][c] = 0;
  entry = null; exit = null;
  draw();
};

// === Path Generation (BFS on path cells from entry to exit) ===
function generatePath() {
  if (!entry || !exit) {
    alert('請先設定入口（紅）和出口（綠）！');
    return null;
  }

  // BFS to find shortest path through path cells
  const visited = Array.from({length: ROWS}, () => Array(COLS).fill(false));
  const parent = Array.from({length: ROWS}, () => Array(COLS).fill(null));
  const queue = [{x: entry.x, y: entry.y}];
  visited[entry.y][entry.x] = true;

  const dirs = [{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}];
  let found = false;

  while (queue.length > 0) {
    const cur = queue.shift();
    if (cur.x === exit.x && cur.y === exit.y) { found = true; break; }

    for (const d of dirs) {
      const nx = cur.x + d.dx, ny = cur.y + d.dy;
      if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && !visited[ny][nx] && grid[ny][nx] === 1) {
        visited[ny][nx] = true;
        parent[ny][nx] = {x: cur.x, y: cur.y};
        queue.push({x: nx, y: ny});
      }
    }
  }

  if (!found) {
    alert('入口到出口之間沒有連通的路徑！請確保路徑格子相連。');
    return null;
  }

  // Backtrack
  const path = [];
  let cur = {x: exit.x, y: exit.y};
  while (cur) {
    path.unshift(cur);
    cur = parent[cur.y][cur.x];
  }

  return path;
}

document.getElementById('btn-generate').onclick = () => {
  const path = generatePath();
  if (!path) return;

  const output = document.getElementById('output');
  output.style.display = 'block';

  // Generate JS code
  let code = `// 玩家路徑（由地圖編輯器產生）\nthis.path = [\n`;
  for (let i = 0; i < path.length; i++) {
    code += `  {x:${path[i].x}, y:${path[i].y}}`;
    if (i < path.length - 1) code += ',';
    code += '\n';
  }
  code += `];\n\n`;

  // Also generate the grid data for reference
  code += `// 路徑格子（用於 isPath 判定）\n`;
  code += `// 總共 ${path.length} 個路徑點\n`;
  code += `// 入口: (${entry.x}, ${entry.y})  出口: (${exit.x}, ${exit.y})\n\n`;

  // Generate pathSet for quick check
  code += `// pathSet（所有路徑格子，含 2 格寬的完整區域）\n`;
  code += `const pathCells = new Set();\n`;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] === 1) {
        code += `pathCells.add('${c},${r}');\n`;
      }
    }
  }

  output.textContent = code;

  // Copy to clipboard
  navigator.clipboard.writeText(code).then(() => {
    output.textContent = '✅ 已複製到剪貼簿！\n\n' + code;
  }).catch(() => {
    output.textContent = '（請手動複製）\n\n' + code;
  });
};

// === Preview ===
document.getElementById('btn-preview').onclick = () => {
  const path = generatePath();
  if (!path) return;

  const pc = document.getElementById('preview-canvas');
  pc.style.display = 'block';
  pc.width = COLS * CELL;
  pc.height = ROWS * CELL;
  const pctx = pc.getContext('2d');

  // Draw grid
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      pctx.fillStyle = grid[r][c] === 1 ? '#3a3a3a' : '#2d5a27';
      pctx.fillRect(c * CELL, r * CELL, CELL, CELL);
      pctx.strokeStyle = '#222';
      pctx.lineWidth = 0.5;
      pctx.strokeRect(c * CELL, r * CELL, CELL, CELL);
    }
  }

  // Draw path line
  pctx.strokeStyle = '#ff6b6b';
  pctx.lineWidth = 3;
  pctx.beginPath();
  pctx.moveTo(path[0].x * CELL + CELL/2, path[0].y * CELL + CELL/2);
  for (let i = 1; i < path.length; i++) {
    pctx.lineTo(path[i].x * CELL + CELL/2, path[i].y * CELL + CELL/2);
  }
  pctx.stroke();

  // Draw arrows along path
  pctx.fillStyle = '#ff6b6b';
  for (let i = 0; i < path.length; i += Math.max(1, Math.floor(path.length / 15))) {
    const p = path[i];
    pctx.beginPath();
    pctx.arc(p.x * CELL + CELL/2, p.y * CELL + CELL/2, 4, 0, Math.PI * 2);
    pctx.fill();
  }

  // Entry/Exit markers
  pctx.font = 'bold 14px sans-serif';
  pctx.textAlign = 'center';
  pctx.textBaseline = 'middle';

  pctx.fillStyle = '#e94560';
  pctx.fillText('▶入口', path[0].x * CELL + CELL/2, path[0].y * CELL + CELL/2);

  pctx.fillStyle = '#4ecdc4';
  pctx.fillText('🏠出口', path[path.length-1].x * CELL + CELL/2, path[path.length-1].y * CELL + CELL/2);
};

// Initial draw
draw();
</script>
</body>
</html>
