<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Test — Tower Defense</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d1a; color: #eee; font-family: monospace; font-size: 13px; padding: 16px; }
  h1 { color: #ffd93d; margin-bottom: 12px; font-size: 16px; }
  #controls { margin-bottom: 16px; display: flex; gap: 8px; align-items: center; }
  button { background: #2a1a3e; border: 1px solid #555; color: #eee; padding: 6px 16px; border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 12px; }
  button:hover { border-color: #ffd93d; color: #ffd93d; }
  #summary { font-size: 14px; font-weight: bold; padding: 8px 12px; border-radius: 4px; background: #1a1a2e; margin-bottom: 16px; }
  #summary.all-pass { color: #55efc4; border-left: 3px solid #55efc4; }
  #summary.has-fail  { color: #e94560; border-left: 3px solid #e94560; }
  .group { margin-bottom: 16px; }
  .group-title { color: #74b9ff; font-weight: bold; font-size: 12px; padding: 4px 0; border-bottom: 1px solid #333; margin-bottom: 6px; }
  .test { padding: 3px 8px; margin: 2px 0; border-radius: 3px; line-height: 1.5; }

<body>

<div id="controls">
  <button id="btn-run">▶ Run All Tests</button>
  <button id="btn-fail">❌ Failures Only</button>

</div>

<!-- Dependencies -->
<script src="js/skills.js"></script>
<script src="js/config.js"></script>

<!-- ============================================================
     MockGame — 最小化 doDmg 執行環境
     doDmg 原始碼來自 game.js，移除 SANDBOX/fireDmg/render 追蹤
     ============================================================ -->
<script>
class MockGame {
  constructor() {
    this.hp     = 40;
    this.maxHp  = 40;
    this.gold   = 200;
    this.towers  = [];
    this.enemies = [];
    this.zones   = [];
    this.effects = [];
    // blink/path 需要 path.length，給一個夠長的假路徑
    this.path = Array.from({length: 50}, (_, i) => ({x: i, y: 5}));
    this.addBattleLog = () => {};
  }

  // ── Helpers（精簡版，以 enemy.x/y 為座標）──
  ePos(e) { return {x: e.x ?? 5, y: e.y ?? 5}; }
  addFx() {}
  getEnemiesNear(x, y, r) {
    return this.enemies.filter(e => {
      const p = this.ePos(e);
      return Math.hypot(p.x - x, p.y - y) <= r;
    });
  }

  // ── doDmg：複製自 game.js，移除 SANDBOX 追蹤 ──
  doDmg(enemy, baseDmg, elem, tower) {
    // dodge
    const dodgeSk = getSkill(enemy, 'dodge');
    if (dodgeSk && Math.random() < dodgeSk.chance) return;

    let dmg = baseDmg;

    if (tower) {
      // unstable
      const unstableSk = getSkill(tower, 'unstable');
      if (unstableSk) dmg *= (1 + (Math.random() * 2 - 1) * unstableSk.variance);
      // execute
      const executeSk = getSkill(tower, 'execute');
      if (executeSk && enemy.hp / enemy.maxHp < executeSk.threshold) dmg *= executeSk.mult;
    }

    // 元素相剋
    if (elem && enemy.elem && CONFIG.elemAdv[elem]) {
      const advMult = CONFIG.elemAdv[elem][enemy.elem];
      if (advMult) dmg *= advMult;
    }

    // Armor
    let armor = (enemy.armor || 0) + (enemy.armorStacks || 0) * 0.1;
    const shredAmt = (enemy.shredStacks || 0) * GLOBAL_CAPS.shredPerStack;
    armor = Math.max(0, armor - shredAmt);
    dmg *= (1 - Math.min(armor, 0.8));

    // Resist
    const res = (enemy.resist || {})[elem] || 0;
    dmg *= (1 - res);

    // vulnerability
    const vulnAmt = (enemy.vulnStacks || 0) * GLOBAL_CAPS.vulnPerStack;
    if (vulnAmt > 0) dmg *= (1 + vulnAmt);

    // 最終傷害
    let finalDmg = Math.max(1, Math.floor(dmg));
    // fortify
    const fortifySk = getSkill(enemy, 'fortify');
    if (fortifySk) finalDmg = Math.min(finalDmg, fortifySk.dmgCap);
    // resilient
    if (enemy._resilientReduction > 0)
      finalDmg = Math.max(1, Math.floor(finalDmg * (1 - enemy._resilientReduction)));
    // phaseShift
    if ((enemy.resist || {})._dmgReduce)
      finalDmg = Math.max(1, Math.floor(finalDmg * (1 - enemy.resist._dmgReduce)));

    enemy.hp -= finalDmg;
    if (tower) enemy._lastHitTower = tower;

    // shield
    const shieldSkill = getSkill(enemy, 'shield');
    if (enemy.hp <= 0 && shieldSkill && !enemy._shieldUsed) {
      enemy.hp = 1;
      enemy._shieldUsed = true;
    }

    // tenacity
    const ten = getSkill(enemy, 'tenacity');
    const ccMult = ten ? (1 - ten.ccReduce) : 1.0;

    if (tower) {
      // burn
      const burnSk = getSkill(tower, 'burn');
      if (burnSk) {
        const igniteSk = getSkill(tower, 'ignite');
        const detSk    = getSkill(tower, 'detonate');
        if (enemy.burnTimer > 0 && igniteSk) {
          const igniteDmg = Math.floor(baseDmg * igniteSk.flat);
          enemy.hp -= igniteDmg;
        }
        enemy.burnStacks = (enemy.burnStacks || 0) + 1;
        const burnCoeff = tower.damage * tower.atkSpd;
        enemy.burnDmg   = burnCoeff * burnSk.dot;
        enemy.burnTimer = burnSk.dur;
        if (enemy.burnStacks >= 3 && detSk) {
          const detDmg = Math.floor(baseDmg * detSk.ratio);
          if (detSk.aoe) {
            const p = this.ePos(enemy);
            this.getEnemiesNear(p.x, p.y, detSk.aoe).forEach(e => { e.hp -= detDmg; });
          } else {
            enemy.hp -= detDmg;
          }
          enemy.burnStacks = 0;
        }
      }

      // chill
      const chillSk = getSkill(tower, 'chill');
      if (chillSk) {
        enemy.chillStacks = Math.min(
          GLOBAL_CAPS.chillMaxStacks,
          (enemy.chillStacks || 0) + (chillSk.stacksPerHit || 1)
        );
        enemy.chillDecay = 0;
        // freeze
        const freezeSk = getSkill(tower, 'freeze');
        if (freezeSk && enemy.chillStacks >= freezeSk.threshold) {
          enemy.stunTimer = Math.max(enemy.stunTimer || 0, freezeSk.dur * ccMult);
          enemy.chillStacks = 0;
        }
      }

      // shred
      const shredSk = getSkill(tower, 'shred');
      if (shredSk) {
        enemy.shredStacks = Math.min(
          GLOBAL_CAPS.shredMaxStacks,
          (enemy.shredStacks || 0) + (shredSk.stacksPerHit || 1)
        );
        enemy.shredDecay = 0;
      }

      // vulnerability
      const vulnSk = getSkill(tower, 'vulnerability');
      if (vulnSk) {
        enemy.vulnStacks = Math.min(
          GLOBAL_CAPS.vulnMaxStacks,
          (enemy.vulnStacks || 0) + (vulnSk.stacksPerHit || 1)
        );
        enemy.vulnDecay = 0;
      }

      // hpPct
      const hpPctSk = getSkill(tower, 'hpPct');
      if (hpPctSk && (tower.atkCount || 0) % hpPctSk.every === 0) {
        if (!enemy._hpPctCd || enemy._hpPctCd <= 0) {
          const rawHpDmg = Math.floor(enemy.maxHp * hpPctSk.pct);
          const hpDmg = hpPctSk.cap ? Math.min(rawHpDmg, hpPctSk.cap) : rawHpDmg;
          enemy.hp -= hpDmg;
          enemy._hpPctCd = hpPctSk.cd;
        }
      }

      // lifedrain
      const lifedrainSk = getSkill(tower, 'lifedrain');
      if (lifedrainSk) {
        this.hp = Math.min(this.maxHp, this.hp + Math.max(1, Math.floor(finalDmg * lifedrainSk.pct)));
      }

      // warp
      const warpSk = getSkill(tower, 'warp');
      if (warpSk && (!tower._warpCd || tower._warpCd <= 0)) {
        enemy.stunTimer = Math.max(enemy.stunTimer || 0, warpSk.dur * ccMult);
        tower._warpCd = warpSk.cd;
      }

      // knockback
      const knockSk = getSkill(tower, 'knockback');
      if (knockSk && (!tower._knockCd || tower._knockCd <= 0)) {
        enemy.pathIdx = Math.max(0, (enemy.pathIdx || 0) - knockSk.dist);
        tower._knockCd = knockSk.cd;
      }
    }

    // 敵人被動
    const armorSk = getSkill(enemy, 'armorStack');
    if (armorSk) {
      enemy.armorStacks = Math.min(
        armorSk.cap / armorSk.perHit,
        (enemy.armorStacks || 0) + 1
      );
    }
    const resilientSk = getSkill(enemy, 'resilient');
    if (resilientSk) {
      enemy._resilientReduction = Math.min(
        resilientSk.cap,
        (enemy._resilientReduction || 0) + resilientSk.stack
      );
    }
  }

  // ── tickEnemy：burn/chill/shred/vuln 衰減 + regen + blink ──
  tickEnemy(enemy, dt) {
    if (enemy.stunTimer > 0) { enemy.stunTimer -= dt; return; }

    // chill 衰減
    if (enemy.chillStacks > 0) {
      enemy.chillDecay = (enemy.chillDecay || 0) + dt;
      const decayStacks = Math.floor(enemy.chillDecay * GLOBAL_CAPS.chillDecayRate);
      if (decayStacks > 0) {
        enemy.chillStacks = Math.max(0, enemy.chillStacks - decayStacks);
        enemy.chillDecay -= decayStacks / GLOBAL_CAPS.chillDecayRate;
      }
    }

    // regen
    const regenSk = getSkill(enemy, 'regen');
    if (regenSk) enemy.hp = Math.min(enemy.maxHp, enemy.hp + enemy.maxHp * regenSk.pct * dt);

    // burn DOT
    if (enemy.burnTimer > 0) {
      const burnDt = Math.min(dt, enemy.burnTimer);
      enemy.hp -= enemy.burnDmg * burnDt;
      enemy.burnTimer -= dt;
    }
    if (enemy.burnTimer <= 0) enemy.burnStacks = 0;

    // shred 衰減
    if (enemy.shredStacks > 0) {
      enemy.shredDecay = (enemy.shredDecay || 0) + dt;
      const sd = Math.floor(enemy.shredDecay * GLOBAL_CAPS.shredDecayRate);
      if (sd > 0) {
        enemy.shredStacks = Math.max(0, enemy.shredStacks - sd);
        enemy.shredDecay -= sd / GLOBAL_CAPS.shredDecayRate;
      }
    }

    // vuln 衰減
    if (enemy.vulnStacks > 0) {
      enemy.vulnDecay = (enemy.vulnDecay || 0) + dt;
      const vd = Math.floor(enemy.vulnDecay * GLOBAL_CAPS.vulnDecayRate);
      if (vd > 0) {
        enemy.vulnStacks = Math.max(0, enemy.vulnStacks - vd);
        enemy.vulnDecay -= vd / GLOBAL_CAPS.vulnDecayRate;
      }
    }

    // hpPct 冷卻衰減
    if (enemy._hpPctCd > 0) enemy._hpPctCd -= dt;

    // blink
    const blinkSk = getSkill(enemy, 'blink');
    if (blinkSk && enemy.hp / enemy.maxHp < blinkSk.hpTrigger) {
      if (!enemy._blinkCd || enemy._blinkCd <= 0) {
        enemy.pathIdx = Math.min(this.path.length - 0.1, (enemy.pathIdx || 0) + blinkSk.dist);
        enemy._blinkCd = blinkSk.cd;
      } else {
        enemy._blinkCd -= dt;
      }
    }
  }

  // ── tickTowers：aura 預計算 + field_slow/shred/vuln + field_stun/dmg/burn ──
  tickTowers(dt) {
    // 重置 aura
    for (const tw of this.towers) {
      tw._auraDmgFlat = 0; tw._auraDmgPct = 0; tw._auraAtkSpd = 0; tw._auraRange = 0;
    }
    // aura 計算（排除自己）
    for (const src of this.towers) {
      const ad = getSkill(src, 'aura_dmg');
      const aa = getSkill(src, 'aura_atkSpd');
      const ar = getSkill(src, 'aura_range');
      if (!ad && !aa && !ar) continue;
      for (const tw of this.towers) {
        if (tw === src) continue;
        const dist = Math.hypot(tw.x - src.x, tw.y - src.y);
        if (ad && dist <= ad.radius) { tw._auraDmgFlat += ad.flat; tw._auraDmgPct += ad.pct; }
        if (aa && dist <= aa.radius)
          tw._auraAtkSpd = Math.min(GLOBAL_CAPS.atkSpdBonus, tw._auraAtkSpd + aa.bonus);
        if (ar && dist <= ar.radius) tw._auraRange += ar.bonus;
      }
    }

    // field_slow / field_shred / field_vuln
    for (const tw of this.towers) {
      const fSlow  = getSkill(tw, 'field_slow');
      const fShred = getSkill(tw, 'field_shred');
      const fVuln  = getSkill(tw, 'field_vuln');
      if (fSlow) {
        this.getEnemiesNear(tw.x, tw.y, fSlow.radius).forEach(e => {
          e.chillStacks = Math.max(e.chillStacks || 0, fSlow.chillStacks); e.chillDecay = 0;
        });
      }
      if (fShred) {
        this.getEnemiesNear(tw.x, tw.y, fShred.radius).forEach(e => {
          e.shredStacks = Math.max(e.shredStacks || 0, fShred.shredStacks); e.shredDecay = 0;
        });
      }
      if (fVuln) {
        this.getEnemiesNear(tw.x, tw.y, fVuln.radius).forEach(e => {
          e.vulnStacks = Math.max(e.vulnStacks || 0, fVuln.vulnStacks); e.vulnDecay = 0;
        });
      }

      // field_stun
      const fStun = getSkill(tw, 'field_stun');
      if (fStun) {
        if (tw._fieldStunCd === undefined) tw._fieldStunCd = 0;
        tw._fieldStunCd -= dt;
        if (tw._fieldStunCd <= 0) {
          tw._fieldStunCd = fStun.cd;
          this.getEnemiesNear(tw.x, tw.y, fStun.radius).forEach(e => {
            const ccMult = hasSkill(e, 'tenacity') ? (1 - getSkill(e, 'tenacity').ccReduce) : 1;
            e.stunTimer = Math.max(e.stunTimer || 0, fStun.dur * ccMult);
          });
        }
      }

      // field_dmg
      const fDmg = getSkill(tw, 'field_dmg');
      if (fDmg) {
        if (tw._fieldDmgCd === undefined) tw._fieldDmgCd = 0;
        tw._fieldDmgCd -= dt;
        if (tw._fieldDmgCd <= 0) {
          tw._fieldDmgCd = fDmg.cd;
          const dmgAmt = (tw.damage || 10) * fDmg.flat;
          this.getEnemiesNear(tw.x, tw.y, fDmg.radius).forEach(e => {
            const armor = e.armor || 0;
            e.hp -= Math.max(1, dmgAmt * (1 - armor));
          });
        }
      }

      // field_burn
      const fBurn = getSkill(tw, 'field_burn');
      if (fBurn) {
        if (tw._fieldBurnCd === undefined) tw._fieldBurnCd = 0;
        tw._fieldBurnCd -= dt;
        if (tw._fieldBurnCd <= 0) {
          tw._fieldBurnCd = fBurn.interval;
          const burnDps = (tw.damage || 10) * (tw.atkSpd || 1) * fBurn.dot;
          this.getEnemiesNear(tw.x, tw.y, fBurn.radius).forEach(e => {
            e.burnDmg   = burnDps;
            e.burnTimer = fBurn.dur;
          });
        }
      }
    }
  }

  // ── tickZones：zone_slow / zone_shred 區域維持 ──
  tickZones(dt) {
    for (const z of this.zones) {
      z.t = (z.t || 0) + dt;
      if (z.type === 'puddle') {
        this.getEnemiesNear(z.x, z.y, z.r).forEach(e => {
          if (z.slowAmt)    { e.chillStacks = Math.max(e.chillStacks || 0, z.slowAmt); e.chillDecay = 0; }
          if (z.shredTarget){ e.shredStacks = Math.max(e.shredStacks || 0, z.shredTarget); e.shredDecay = 0; }
        });
      }
    }
    this.zones = this.zones.filter(z => z.t < z.dur);
  }

  // ── triggerCycleSkills：cycle_* 攻擊觸發 ──
  triggerCycleSkills(tower, mainTarget) {
    const cycleStun  = getSkill(tower, 'cycle_stun');
    const cycleChill = getSkill(tower, 'cycle_chill');
    const cycleShred = getSkill(tower, 'cycle_shred');
    const cycleVuln  = getSkill(tower, 'cycle_vuln');
    const cycleBurn  = getSkill(tower, 'cycle_burn');
    const effects = [
      cycleStun  && {sk: cycleStun,  type: 'stun'},
      cycleChill && {sk: cycleChill, type: 'chill'},
      cycleShred && {sk: cycleShred, type: 'shred'},
      cycleVuln  && {sk: cycleVuln,  type: 'vuln'},
      cycleBurn  && {sk: cycleBurn,  type: 'burn'},
    ].filter(Boolean);
    for (const {sk, type} of effects) {
      const nearby = this.getEnemiesNear(tower.x, tower.y, sk.radius);
      nearby.forEach(e => {
        const ccMult = hasSkill(e, 'tenacity') ? (1 - getSkill(e, 'tenacity').ccReduce) : 1;
        if      (type === 'stun')  e.stunTimer  = Math.max(e.stunTimer || 0, Math.min(sk.dur, 2.0) * ccMult);
        else if (type === 'chill') e.chillStacks = Math.min((e.chillStacks||0) + sk.stacksPerCycle, GLOBAL_CAPS.chillMaxStacks);
        else if (type === 'shred') e.shredStacks = Math.min((e.shredStacks||0) + sk.stacksPerCycle, GLOBAL_CAPS.shredMaxStacks);
        else if (type === 'vuln')  e.vulnStacks  = Math.min((e.vulnStacks||0)  + sk.stacksPerCycle, GLOBAL_CAPS.vulnMaxStacks);
        else if (type === 'burn')  { e.burnDmg = (tower.damage||10)*(tower.atkSpd||1)*sk.dot; e.burnTimer = sk.dur; }
      });
    }
  }

  // ── processKill：擊殺獎勵（killGold / permaBuff）──
  processKill(enemy) {
    this.gold += enemy.killGold || 0;
    if (enemy._lastHitTower) {
      const kgSk = getSkill(enemy._lastHitTower, 'killGold');
      if (kgSk) this.gold += Math.floor((enemy.killGold || CONFIG.killGoldAiSend) * kgSk.bonus);
      const pbSk = getSkill(enemy._lastHitTower, 'permaBuff');
      if (pbSk) enemy._lastHitTower._permaBuff = (enemy._lastHitTower._permaBuff || 0) + pbSk.atkPerKill;
    }
  }

  // ── processWaveInterest：每波利息結算 ──
  processWaveInterest() {
    const interestTower = this.towers.find(tw => hasSkill(tw, 'interest'));
    if (!interestTower) return;
    const iSk = getSkill(interestTower, 'interest');
    const bonus = Math.min(Math.floor(this.gold * iSk.rate), iSk.cap);
    if (bonus > 0) this.gold += bonus;
  }
}
</script>

<!-- ============================================================
     Test Helpers
     ============================================================ -->
<script>
function mkEnemy(overrides = {}) {
  return {
    hp: 100, maxHp: 100, armor: 0, resist: {},
    elem: null, killGold: 0,
    chillStacks: 0, chillDecay: 0, stunTimer: 0,
    burnDmg: 0, burnTimer: 0, burnStacks: 0,
    shredStacks: 0, shredDecay: 0,
    vulnStacks: 0, vulnDecay: 0,
    armorStacks: 0, _resilientReduction: 0, _hpPctCd: 0,
    speed: 2, pathIdx: 0, x: 5, y: 5,
    skills: [],
    ...overrides
  };
}

function mkTower(skills = [], stats = {}) {
  return {
    x: 5, y: 5, damage: 50, atkSpd: 1, range: 3, aoe: 0,
    atkCount: 0, atkTimer: 0,
    skills,
    _rampBonus: 0, _rampTarget: null,
    _warpCd: 0, _knockCd: 0,
    _killRushTimer: 0, _killRushBonus: 0,
    _auraDmgFlat: 0, _auraDmgPct: 0, _auraAtkSpd: 0, _auraRange: 0,
    _permaBuff: 0,
    ...stats
  };
}
</script>

<!-- ============================================================
     Test Runner
     ============================================================ -->
<script>
const _tests = [];
let _currentGroup = '未分組';

function group(name) { _currentGroup = name; }

function test(name, fn) {
  _tests.push({ name, group: _currentGroup, fn });
}

function assertEqual(actual, expected, label = '') {
  if (actual !== expected)
    throw new Error(`${label ? label + ': ' : ''}expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
}

function assertRange(actual, lo, hi, label = '') {
  if (actual < lo || actual > hi)
    throw new Error(`${label ? label + ': ' : ''}expected [${lo}, ${hi}], got ${actual}`);
}

function assert(cond, label = '') {
  if (!cond)
    throw new Error(`${label ? label + ': ' : ''}assertion failed`);
}

function runAll(filterFn = () => true) {
  const results = [];
  for (const t of _tests) {
    if (!filterFn(t)) continue;
    try {
      t.fn();
      results.push({...t, pass: true});
    } catch(e) {
      results.push({...t, pass: false, error: e.message});
    }
  }
  renderResults(results);
  return results;
}

function renderResults(results) {
  const container = document.getElementById('results');
  container.innerHTML = '';

  // 統計
  const passed = results.filter(r => r.pass).length;
  const failed = results.filter(r => !r.pass).length;
  const summaryEl = document.getElementById('summary');
  summaryEl.style.display = '';
  summaryEl.textContent = failed === 0
    ? `✅ ${passed} passed — all green`
    : `❌ ${failed} failed / ${passed} passed`;
  summaryEl.className = failed === 0 ? 'all-pass' : 'has-fail';

  // 按 group 分組
  const grouped = {};
  for (const r of results) {
    if (!grouped[r.group]) grouped[r.group] = [];
    grouped[r.group].push(r);
  }

  for (const [grp, items] of Object.entries(grouped)) {
    const gPassed = items.filter(i => i.pass).length;
    const gFailed = items.filter(i => !i.pass).length;
    const div = document.createElement('div');
    div.className = 'group';
    const badge = gFailed > 0 ? `<span style="color:#e94560">${gFailed}❌</span>` : `<span style="color:#55efc4">✅</span>`;
    div.innerHTML = `<div class="group-title">${grp}　${badge}　${gPassed}/${items.length}</div>`;
    for (const r of items) {
      const el = document.createElement('div');
      el.className = `test ${r.pass ? 'pass' : 'fail'}`;
      el.innerHTML = r.pass
        ? `✅ ${r.name}`
        : `❌ ${r.name}<span class="err">${r.error}</span>`;
      div.appendChild(el);
    }
    container.appendChild(div);
  }

  if (results.length === 0) {
    container.innerHTML = '<div style="color:#888;padding:12px;">（尚無測試案例）</div>';
    summaryEl.textContent = '0 passed / 0 failed';
    summaryEl.className = 'all-pass';
  }
}

document.getElementById('btn-run').onclick = () => {
  const kw = document.getElementById('filter').value.toLowerCase();
  runAll(t => !kw || t.name.toLowerCase().includes(kw) || t.group.toLowerCase().includes(kw));
};

document.getElementById('btn-fail').onclick = () => {
  const results = runAll();
  renderResults(results.filter(r => !r.pass));
};
</script>

<!-- ============================================================
     Step 2：直接傷害修飾類技能測試

<script>
group('💥 直接傷害修飾（unstable / execute / shred / vuln / hpPct / fortify / resilient / dodge）');

// ── unstable ──────────────────────────────────────────────────
test('unstable: variance=0.5 傷害在 [50, 150] 內', () => {
  // baseDmg=100, variance=0.5 → dmg = 100 * (1 ± 0.5) ∈ [50, 150]
  const tower = mkTower([makeSkill('unstable', {variance: 0.5})]);
  let min = Infinity, max = -Infinity;
  for (let i = 0; i < 500; i++) {
    const e = mkEnemy({hp: 10000, maxHp: 10000});
    const hpBefore = e.hp;
    new MockGame().doDmg(e, 100, null, tower);
    const dmg = hpBefore - e.hp;
    if (dmg < min) min = dmg;
    if (dmg > max) max = dmg;
  }
  assert(min >= 50, `min dmg should be ≥50, got ${min}`);
  assert(max <= 150, `max dmg should be ≤150, got ${max}`);
});

test('unstable: variance=0.5 平均傷害 ≈ 100 (±8)', () => {
  const tower = mkTower([makeSkill('unstable', {variance: 0.5})]);
  let total = 0;
  const N = 1000;
  for (let i = 0; i < N; i++) {
    const e = mkEnemy({hp: 10000, maxHp: 10000});
    new MockGame().doDmg(e, 100, null, tower);
    total += 10000 - e.hp;
  }
  const mean = total / N;
  assertRange(mean, 92, 108, `mean dmg should ≈100, got ${mean.toFixed(1)}`);
});

// ── execute ────────────────────────────────────────────────────
test('execute: HP > threshold 時無加成', () => {
  const tower = mkTower([makeSkill('execute', {threshold: 0.2, mult: 2})]);
  const enemy = mkEnemy({hp: 80, maxHp: 100});  // 80% HP，高於 20%
  new MockGame().doDmg(enemy, 50, null, tower);
  assertEqual(enemy.hp, 30, 'hp 80 - 50 = 30');
});

test('execute: HP < threshold 時傷害 ×mult', () => {
  const tower = mkTower([makeSkill('execute', {threshold: 0.2, mult: 2})]);
  const enemy = mkEnemy({hp: 15, maxHp: 100});  // 15% HP，低於 20%
  new MockGame().doDmg(enemy, 50, null, tower);
  assertEqual(enemy.hp, -85, 'hp 15 - 100(×2) = -85');
});

test('execute: HP == threshold 不觸發（嚴格小於）', () => {
  // 條件是 enemy.hp / enemy.maxHp < threshold（嚴格小於）
  const tower = mkTower([makeSkill('execute', {threshold: 0.2, mult: 2})]);
  const enemy = mkEnemy({hp: 20, maxHp: 100});  // 剛好 20%，不觸發
  new MockGame().doDmg(enemy, 50, null, tower);
  assertEqual(enemy.hp, -30, 'hp 20 - 50 = -30（無加成）');
});

// ── shred ──────────────────────────────────────────────────────
test('shred: 命中後 shredStacks 遞增', () => {
  const tower = mkTower([makeSkill('shred', {stacksPerHit: 2})]);
  const enemy = mkEnemy({armor: 0.5});
  new MockGame().doDmg(enemy, 100, null, tower);
  assertEqual(enemy.shredStacks, 2, 'shredStacks after 1 hit');
  new MockGame().doDmg(enemy, 100, null, tower);
  assertEqual(enemy.shredStacks, 4, 'shredStacks after 2 hits');
});

test('shred: 第1擊全護甲，第2擊護甲略降（shred 在計算後才疊加）', () => {
  // armor=0.5，shredPerStack=0.005
  // 1st hit: shredAmt=0 → armor=0.5 → dmg=100*(1-0.5)=50
  // 2nd hit: shredAmt=2*0.005=0.01 → armor=0.49 → dmg=floor(100*(1-0.49))=51
  const game  = new MockGame();
  const tower = mkTower([makeSkill('shred', {stacksPerHit: 2})]);
  const enemy = mkEnemy({hp: 1000, maxHp: 1000, armor: 0.5});

  game.doDmg(enemy, 100, null, tower);
  const dmg1 = 1000 - enemy.hp;
  assertEqual(dmg1, 50, '1st hit dmg=50（全護甲）');

  game.doDmg(enemy, 100, null, tower);
  const dmg2 = (1000 - dmg1) - enemy.hp;
  assertEqual(dmg2, 51, '2nd hit dmg=51（shred 削護甲）');
});

test('shred: shredStacks 上限為 GLOBAL_CAPS.shredMaxStacks', () => {
  const tower = mkTower([makeSkill('shred', {stacksPerHit: 100})]);
  const enemy = mkEnemy({shredStacks: GLOBAL_CAPS.shredMaxStacks - 50});
  new MockGame().doDmg(enemy, 50, null, tower);
  assertEqual(enemy.shredStacks, GLOBAL_CAPS.shredMaxStacks, 'shredStacks capped');
});

test('shred: 護甲不會因 shred 變負（max 0）', () => {
  // shredStacks=120 → shredAmt=0.6，armor=0.5 → armor=max(0, 0.5-0.6)=0
  const tower = mkTower([]);
  const enemy = mkEnemy({hp: 1000, maxHp: 1000, armor: 0.5, shredStacks: 120});
  new MockGame().doDmg(enemy, 100, null, tower);
  // armor = max(0, 0.5 - 0.6) = 0 → dmg = 100
  assertEqual(1000 - enemy.hp, 100, 'armor floored at 0, full damage');
});

// ── vulnerability ──────────────────────────────────────────────
test('vulnerability: 第1擊無加成（stacks 在擊後才施加）', () => {
  const tower = mkTower([makeSkill('vulnerability', {stacksPerHit: 5})]);
  const enemy = mkEnemy({hp: 1000, maxHp: 1000});
  new MockGame().doDmg(enemy, 100, null, tower);
  assertEqual(1000 - enemy.hp, 100, '1st hit: no vuln bonus yet');
  assertEqual(enemy.vulnStacks, 5, 'vulnStacks=5 after 1st hit');
});

test('vulnerability: 第2擊受 stacks 放大', () => {
  // vulnStacks=5 → vulnAmt=5*0.02=0.1 → dmg=floor(100*1.1)=110
  const tower = mkTower([makeSkill('vulnerability', {stacksPerHit: 5})]);
  const enemy = mkEnemy({hp: 1000, maxHp: 1000});
  const game  = new MockGame();
  game.doDmg(enemy, 100, null, tower);  // 1st: stacks=0, 打完→stacks=5
  game.doDmg(enemy, 100, null, tower);  // 2nd: stacks=5, dmg=110
  assertEqual(1000 - enemy.hp - 100, 110, '2nd hit dmg=110（vuln +10%）');
});

test('vulnerability: vulnStacks 上限為 GLOBAL_CAPS.vulnMaxStacks', () => {
  const tower = mkTower([makeSkill('vulnerability', {stacksPerHit: 50})]);
  const enemy = mkEnemy({vulnStacks: GLOBAL_CAPS.vulnMaxStacks - 10});
  new MockGame().doDmg(enemy, 50, null, tower);
  assertEqual(enemy.vulnStacks, GLOBAL_CAPS.vulnMaxStacks, 'vulnStacks capped');
});

// ── hpPct ──────────────────────────────────────────────────────
// 注意：實際遊戲中 atkCount 在攻擊迴圈遞增（先++再傳入doDmg）
// 測試中手動設定 atkCount 模擬此行為
test('hpPct: atkCount%every==0 時觸發額外傷害', () => {
  // every=3，baseDmg 傷害另計，hpPct 額外扣血
  const tower = mkTower([makeSkill('hpPct', {pct: 0.05, every: 3, cd: 0, cap: 500})],
                         {damage: 50, atkSpd: 1});
  const enemy = mkEnemy({hp: 1000, maxHp: 1000, _hpPctCd: 0});
  tower.atkCount = 3;  // 3 % 3 = 0 → 觸發
  new MockGame().doDmg(enemy, 50, null, tower);

  assertEqual(1000 - enemy.hp, 100, 'hpPct fires at atkCount=3');
});

test('hpPct: atkCount%every≠0 時不觸發', () => {
  const tower = mkTower([makeSkill('hpPct', {pct: 0.05, every: 3, cd: 0, cap: 500})]);
  const enemy = mkEnemy({hp: 1000, maxHp: 1000, _hpPctCd: 0});

  new MockGame().doDmg(enemy, 50, null, tower);

test('hpPct: cap 限制單次附加傷害上限', () => {
  // maxHp=10000, pct=0.05 → rawHpDmg=500, cap=200 → 取 200
  const tower = mkTower([makeSkill('hpPct', {pct: 0.05, every: 3, cd: 0, cap: 200})]);

test('hpPct: CD 期間不重複觸發', () => {

test('hpPct: 觸發後設定 CD', () => {
  const tower = mkTower([makeSkill('hpPct', {pct: 0.05, every: 3, cd: 2, cap: 500})]);

// ── fortify ────────────────────────────────────────────────────
test('fortify: 單次傷害上限', () => {
  const enemy = mkEnemy({hp: 100, maxHp: 100, skills: [makeSkill('fortify', {dmgCap: 30})]});
  new MockGame().doDmg(enemy, 100, null, null);
  assertEqual(enemy.hp, 70, 'fortify: 100 dmg capped to 30 → hp=70');
});

test('fortify: 低於上限時不截斷', () => {
  const enemy = mkEnemy({hp: 100, maxHp: 100, skills: [makeSkill('fortify', {dmgCap: 30})]});
  new MockGame().doDmg(enemy, 20, null, null);
  assertEqual(enemy.hp, 80, 'fortify: 20 dmg under cap → hp=80');
});

test('fortify: 多次打仍各自受限', () => {
  const enemy = mkEnemy({hp: 100, maxHp: 100, skills: [makeSkill('fortify', {dmgCap: 30})]});
  const game  = new MockGame();
  game.doDmg(enemy, 100, null, null);  // cap→30, hp=70
  game.doDmg(enemy, 100, null, null);  // cap→30, hp=40
  game.doDmg(enemy, 100, null, null);  // cap→30, hp=10
  assertEqual(enemy.hp, 10, 'fortify: each hit capped separately');
});

// ── resilient ──────────────────────────────────────────────────
test('resilient: 第1擊無減傷（_resilientReduction 初始為0）', () => {
  const enemy = mkEnemy({hp: 1000, maxHp: 1000,
    skills: [makeSkill('resilient', {stack: 0.02, cap: 0.4})]});
  new MockGame().doDmg(enemy, 100, null, null);
  assertEqual(1000 - enemy.hp, 100, 'no reduction on 1st hit');
  assertEqual(enemy._resilientReduction, 0.02, 'reduction accumulates after hit');

test('resilient: 第2擊受 reduction 減傷', () => {
  // _resilientReduction=0.02 → finalDmg = floor(100*(1-0.02))=floor(98)=98
  const game  = new MockGame();
  const enemy = mkEnemy({hp: 1000, maxHp: 1000,
    skills: [makeSkill('resilient', {stack: 0.02, cap: 0.4})]});
  game.doDmg(enemy, 100, null, null);  // 1st: dmg=100, reduction→0.02

test('resilient: reduction 上限 cap（不超過 0.4）', () => {

test('resilient: 達上限後傷害固定（1 - cap）', () => {

test('dodge: chance=1.0 每次必閃（不扣血）', () => {

<script>
group('🔥 火鏈狀態機（burn / ignite / detonate）');

// ── burn 初次命中 ──────────────────────────────────────────────
test('burn: 命中後設定 burnTimer / burnDmg / burnStacks', () => {
  // burnCoeff = tower.damage * tower.atkSpd = 50 * 1 = 50
  // burnDmg   = burnCoeff * dot = 50 * 0.3 = 15
  const game  = new MockGame();
  const tower = mkTower([makeSkill('burn', {dot: 0.3, dur: 3})], {damage: 50, atkSpd: 1});
  const enemy = mkEnemy();
  game.doDmg(enemy, 50, null, tower);
  assertEqual(enemy.burnTimer,  3,  'burnTimer = dur');
  assertEqual(enemy.burnDmg,    15, 'burnDmg = 50*1*0.3');
  assertEqual(enemy.burnStacks, 1,  'burnStacks = 1 after 1st hit');
});

test('burn: burnDmg 使用 tower.damage × atkSpd × dot（非 baseDmg）', () => {
  // baseDmg=30（與 tower.damage=80 不同），確認 burnDmg 用 tower 數值
  const game  = new MockGame();
  const tower = mkTower([makeSkill('burn', {dot: 0.5, dur: 3})], {damage: 80, atkSpd: 2});
  const enemy = mkEnemy();
  game.doDmg(enemy, 30, null, tower);
  // burnDmg = 80 * 2 * 0.5 = 80（不是 30 * 0.5 = 15）
  assertEqual(enemy.burnDmg, 80, 'burnDmg = tower.damage*atkSpd*dot');
});

// ── burn DOT tick ──────────────────────────────────────────────
test('burn: DOT tick 每秒扣 burnDmg 血', () => {
  // 手動設定 burnDmg/burnTimer，不混入直接傷害
  const game  = new MockGame();
  const enemy = mkEnemy({hp: 100, burnDmg: 15, burnTimer: 3});

  assertRange(enemy.burnTimer, 1.9, 2.1, 'burnTimer -= 1.0');
});

test('burn: DOT 部分秒數計算正確', () => {
  const game  = new MockGame();
  const enemy = mkEnemy({hp: 100, burnDmg: 20, burnTimer: 3});
  game.tickEnemy(enemy, 0.5);

test('burn: burnTimer 耗盡時不再扣血', () => {
  const game  = new MockGame();
  const enemy = mkEnemy({hp: 100, burnDmg: 10, burnTimer: 1.0});
  game.tickEnemy(enemy, 2.0);  // 超過 burnTimer：只燒 1.0s → 扣 10 血

// ── burn 重複命中 ──────────────────────────────────────────────
test('burn: 重複命中時 burnTimer 重置（不累積）', () => {
  const game  = new MockGame();
  const tower = mkTower([makeSkill('burn', {dot: 0.3, dur: 3})], {damage: 50, atkSpd: 1});
  const enemy = mkEnemy({hp: 1000});

group('Step5 ramp 連攻積累', () => {

  // 模擬 ramp state machine（對應 game.js ~2882-2887）
  function simulateRamp(tower, target, hits) {
    const rampSk = getSkill(tower, 'ramp');
    for (let i = 0; i < hits; i++) {
      if (tower._rampTarget === target) {
        tower._rampBonus = Math.min(rampSk.cap, (tower._rampBonus || 0) + rampSk.perHit);
      } else {
        tower._rampTarget = target;
        tower._rampBonus = Math.max(0, (tower._rampBonus || 0) - (rampSk.switchLoss || 0) * rampSk.perHit);
      }
    }
  }

  test('ramp 4次同目標 = 0.20', () => {
    const tower = mkTower([makeSkill('ramp', {perHit:0.05, cap:0.6, switchLoss:3})]);
    const enemy = mkEnemy();

<script>
// ── Step 6：pierce / chain / multishot ──

// pierce 傷害公式（game.js 2924: Math.max(0.3, 1 - i * pDown)）
function calcPierceRatio(pDown, i) {
  return Math.max(0.3, 1 - i * pDown);
}

// pierce 幾何篩選：點到直線距離（點 px,py；直線起點 lx,ly；單位方向 ux,uy）
// game.js 2913-2916: ex*ux+ey*uy = t (投影)，perpendicular = (ex-t*ux, ey-t*uy)
function pierceFilter(ex, ey, twx, twy, ux, uy, PIERCE_WIDTH) {
  const rx = ex - twx;
  const ry = ey - twy;
  const t  = rx * ux + ry * uy;
  const px = rx - t * ux;
  const py = ry - t * uy;
  return t > 0 && Math.hypot(px, py) <= PIERCE_WIDTH;
}

group('Step6 pierce 傷害公式（遞減）', () => {
  test('第 0 個目標（最近塔）比值 = 1.0', () => {
    assertRange(calcPierceRatio(0.15, 0), 0.999, 1.001, 'pierce i=0 ratio');
  });

  test('第 1 個目標比值 = 0.85', () => {
    assertRange(calcPierceRatio(0.15, 1), 0.849, 0.851, 'pierce i=1 ratio');
  });

  test('第 2 個目標比值 = 0.70', () => {
    assertRange(calcPierceRatio(0.15, 2), 0.699, 0.701, 'pierce i=2 ratio');
  });

  test('比值不低於 MIN_RATIO 0.3（第 5 個目標 1-5*0.15=0.25 → 截斷至 0.3）', () => {
    assertRange(calcPierceRatio(0.15, 5), 0.299, 0.301, 'pierce MIN_RATIO floor');
  });

  test('實際傷害 = floor(effDmg * ratio)', () => {
    const effDmg = 100;
    assertEqual(Math.floor(effDmg * calcPierceRatio(0.15, 0)), 100, 'pierce dmg i=0');
    assertEqual(Math.floor(effDmg * calcPierceRatio(0.15, 1)), 85,  'pierce dmg i=1');
    assertEqual(Math.floor(effDmg * calcPierceRatio(0.15, 2)), 70,  'pierce dmg i=2');
    assertEqual(Math.floor(effDmg * calcPierceRatio(0.15, 5)), 30,  'pierce dmg min');
  });
});

group('Step6 pierce 直線幾何篩選', () => {
  // 塔在 (5,5)，主目標在 (8,5)，方向向量 (1,0)
  const twx=5, twy=5, ux=1, uy=0, W=0.6;

  test('正前方敵人（在直線上）被包含', () => {
    assert(pierceFilter(9, 5, twx, twy, ux, uy, W), 'on-line enemy included');
  });

  test('偏離 0.5 格（< 0.6）被包含', () => {
    assert(pierceFilter(9, 5.5, twx, twy, ux, uy, W), 'dist 0.5 included');
  });

  test('偏離 0.7 格（> 0.6）被排除', () => {
    assert(!pierceFilter(9, 5.7, twx, twy, ux, uy, W), 'dist 0.7 excluded');
  });

  test('正好在邊界 0.6 格被包含（≤ PIERCE_WIDTH）', () => {
    assert(pierceFilter(9, 5.6, twx, twy, ux, uy, W), 'dist 0.6 included');
  });

  test('塔身後的敵人被排除（t ≤ 0）', () => {
    assert(!pierceFilter(3, 5, twx, twy, ux, uy, W), 'behind tower excluded');
  });

  test('pierce 目標依距塔遠近排序（近的 i=0）', () => {
    // 兩敵在直線上：(7,5) 距塔 2，(9,5) 距塔 4
    // 排序後 (7,5) 先打 (i=0)，(9,5) 後打 (i=1)
    const enemies = [{x:9, y:5}, {x:7, y:5}];
    const sorted = enemies.slice().sort((a, b) => {
      const ta = (a.x - twx)*ux + (a.y - twy)*uy;
      const tb = (b.x - twx)*ux + (b.y - twy)*uy;
      return ta - tb;
    });
    assertEqual(sorted[0].x, 7, 'closer enemy first');
    assertEqual(sorted[1].x, 9, 'farther enemy second');
  });
});

// chain 傷害公式（game.js 2966: Math.floor(effDmg * decay^(i+1))）
function calcChainDmg(effDmg, decay, jumpIndex) {
  return Math.floor(effDmg * Math.pow(decay, jumpIndex));
}

  test('第 2 跳 = floor(effDmg * decay^2)', () => {
    assertEqual(calcChainDmg(100, 0.7, 2), 49, 'chain jump2 decay=0.7');
    assertEqual(calcChainDmg(100, 0.5, 2), 25, 'chain jump2 decay=0.5');
  });

  test('floor 截斷（decay=0.7, 3跳: 100*0.343=34.3 → 34）', () => {

    assertEqual(multiSk.shots, 3, 'multishot shots=3');
    // s=0: targets[0]（主目標），s=1: targets[1]，s=2: targets[2]
    const targets = ['A','B','C','D'];
    const hit = [];
    for (let s = 0; s < multiSk.shots; s++) { hit.push(targets[s] || targets[0]); }
    assertEqual(hit.length, 3, 'hits 3 targets');
    assertEqual(hit[0], 'A', 'main target first');
    assertEqual(hit[1], 'B', 'second target');
    assertEqual(hit[2], 'C', 'third target');
  });
});

  test('200g / divisor=20 → bonus = min(10,50) = 10', () => {
    const gold=200, divisor=20, cap=50;

    const gold=15, divisor=20, cap=50;

});

group('Step8 enrage 狂暴（HP閾值）', () => {
  // enrage 在 game.js 的 tickEnemies 速度計算中（MockGame tickEnemy 未計算移動速度）
  // 測試觸發條件的數學邏輯
  test('HP < threshold（20% < 30%）→ 觸發 enrage', () => {
    const hp=20, maxHp=100;
    const enrageSk = makeSkill('enrage', {hpThreshold:0.3, spdMult:2});
    const triggers = hp / maxHp < enrageSk.hpThreshold;
    assert(triggers, 'enrage triggers at 20%');
  });

  test('HP >= threshold（50% >= 30%）→ 不觸發', () => {
    const hp=50, maxHp=100;
    const enrageSk = makeSkill('enrage', {hpThreshold:0.3, spdMult:2});
    assert(!(hp / maxHp < enrageSk.hpThreshold), 'enrage not triggered at 50%');
  });

  test('剛好在閾值（30% → 30% < 30% = false）→ 不觸發', () => {
    const hp=30, maxHp=100;
    const enrageSk = makeSkill('enrage', {hpThreshold:0.3, spdMult:2});
    assert(!(hp / maxHp < enrageSk.hpThreshold), 'enrage not triggered at exact threshold');
  });

  test('速度倍數計算（spd × spdMult）', () => {
    const baseSpd = 2;
    const spdMult = 2;
    const enragedSpd = baseSpd * spdMult;
    assertEqual(enragedSpd, 4, 'enrage speed doubled');
  });
});

group('Step8 shield 護盾', () => {
  test('首次致死後 hp=1，設 _shieldUsed', () => {
    const game = new MockGame();
    const enemy = mkEnemy({hp:10, maxHp:100, skills:[makeSkill('shield', {})]});
    game.doDmg(enemy, 50, null, null);
    assertEqual(enemy.hp, 1, 'shield saves at 1hp');
    assertEqual(enemy._shieldUsed, true, 'shield used flag set');
  });

  test('二次致死後無護盾（hp <= 0）', () => {
    const game = new MockGame();
    const enemy = mkEnemy({hp:10, maxHp:100, skills:[makeSkill('shield', {})]});
    game.doDmg(enemy, 50, null, null); // 首次致死 → hp=1
    game.doDmg(enemy, 50, null, null); // 二次致死
    assert(enemy.hp <= 0, 'no second shield');
  });

  test('傷害不超致死門檻時護盾不觸發', () => {
    const game = new MockGame();
    const enemy = mkEnemy({hp:20, maxHp:100, skills:[makeSkill('shield', {})]});
    game.doDmg(enemy, 10, null, null); // hp 10 → 不致死
    assertEqual(enemy.hp, 10, 'shield not triggered when not lethal');
    assert(!enemy._shieldUsed, 'shield flag not set');
  });
});

group('Step8 blink 低 HP 閃現', () => {
  test('HP < hpTrigger 且無 CD 時觸發 blink', () => {
    const game = new MockGame();
    const enemy = mkEnemy({hp:25, maxHp:100, pathIdx:5,
      skills:[makeSkill('blink', {dist:2, cd:8, hpTrigger:0.3})]});
    game.tickEnemy(enemy, 0.016);
    assert(enemy.pathIdx > 5, 'blink advances pathIdx');
    assertRange(enemy._blinkCd, 7.999, 8.001, 'blink cd set');
  });

  test('CD 中不再 blink', () => {
    const game = new MockGame();
    const enemy = mkEnemy({hp:25, maxHp:100, pathIdx:5,
      skills:[makeSkill('blink', {dist:2, cd:8, hpTrigger:0.3})]});
    enemy._blinkCd = 7; // 手動設 CD
    game.tickEnemy(enemy, 0.016);
    assertEqual(enemy.pathIdx, 5, 'blink blocked by cd');
    assertRange(enemy._blinkCd, 6.983, 6.985, 'blink cd ticks down');
  });

  test('HP >= hpTrigger 時不觸發', () => {
    const game = new MockGame();
    const enemy = mkEnemy({hp:50, maxHp:100, pathIdx:5,
      skills:[makeSkill('blink', {dist:2, cd:8, hpTrigger:0.3})]});
    game.tickEnemy(enemy, 0.016);
    assertEqual(enemy.pathIdx, 5, 'blink not triggered above threshold');
  });

  test('blink pathIdx 上限 path.length - 0.1', () => {
    const game = new MockGame(); // path 長度 50
    const enemy = mkEnemy({hp:10, maxHp:100, pathIdx:49,
      skills:[makeSkill('blink', {dist:10, cd:8, hpTrigger:0.5})]});
    game.tickEnemy(enemy, 0.016);
    // pathIdx = min(50-0.1, 49+10) = min(49.9, 59) = 49.9
    assertRange(enemy.pathIdx, 49.89, 49.91, 'blink capped at path.length-0.1');
  });
});

group('Step8 dodge 敵方閃避', () => {
  test('chance=1.0 必定閃避（hp 不變）', () => {
    const game = new MockGame();
    const enemy = mkEnemy({hp:100, skills:[makeSkill('dodge', {chance:1.0})]});
    game.doDmg(enemy, 100, null, null);
    assertEqual(enemy.hp, 100, 'full dodge: no damage');
  });

  test('chance=0.0 不閃避（hp 減少）', () => {
    const game = new MockGame();
    const enemy = mkEnemy({hp:100, armor:0, skills:[makeSkill('dodge', {chance:0.0})]});
    game.doDmg(enemy, 50, null, null);
    assert(enemy.hp < 100, 'no dodge: hp reduced');
  });
});
